# Animated snake as GIF + SVG (red / dark theme). GIF is what actually shows on many profile READMEs.
name: Generate contribution snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/snake.yml"

permissions:
  contents: write

concurrency:
  group: afeef-profile-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake (dark red snake + crimson grid)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=%23B91C1C&color_dots=%23f5f5f5,%23fecaca,%23f87171,%23ef4444,%23991b1b
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23EF4444&color_dots=%230a0a0a,%231a0505,%23450a0a,%23991b1b,%23dc2626
            dist/github-contribution-grid-snake-dark.gif?palette=github-dark&color_snake=%23EF4444&color_dots=%230a0a0a,%231a0505,%23450a0a,%23991b1b,%23dc2626

      - name: Copy into assets/snake on main
        run: |
          mkdir -p assets/snake
          cp -v dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg dist/github-contribution-grid-snake-dark.gif assets/snake/

      - name: Commit snake assets if changed
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update contribution snake [skip ci]"
          file_pattern: "assets/snake/*"
