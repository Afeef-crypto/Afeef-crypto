name: Generate contribution snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: Afeef-crypto
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Copy SVGs to assets (README uses main branch)
        run: |
          mkdir -p assets/snake
          cp -v dist/github-contribution-grid-snake.svg dist/github-contribution-grid-snake-dark.svg assets/snake/

      - name: Commit snake SVGs if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update contribution snake SVGs [skip ci]"
          file_pattern: assets/snake/*.svg
